<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon projet 122</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Animaux à adopter</h1>
  </header>

  <main>

    <form id="form-add">
      <h2>Ajouter un animal</h2>

      <div class="form-group">
        <label for="input-name">Nom</label>
        <input type="text" id="input-name" placeholder="Ex : Médor" required>
      </div>

      <div class="form-group">
        <label for="input-age">Âge</label>
        <input type="number" id="input-age" min="0" placeholder="Ex : 2" required>
      </div>

      <div class="form-group">
        <label for="input-espece">Espèce</label>
        <select id="input-espece">
          <option value="chat">Chat</option>
          <option value="chien">Chien</option>
          <option value="lapin">Lapin</option>
          <option value="oiseau">Oiseau</option>
        </select>
      </div>

      <div class="form-group">
        <label for="input-sexe">Sexe</label>
        <select id="input-sexe">
          <option value="mâle">Mâle</option>
          <option value="femelle">Femelle</option>
        </select>
      </div>

      <div class="form-group">
        <label for="input-race">Race</label>
        <input type="text" id="input-race" placeholder="Ex : Labrador">
      </div>

      <div class="form-group">
        <label for="input-image">URL de l'image</label>
        <input type="url" id="input-image" placeholder="https://images.unsplash.com/...">
      </div>

      <button type="submit">Ajouter l'animal</button>
    </form>

    <label for="search">Rechercher :</label>
    <input type="text" id="search" placeholder="Rechercher un animal...">
    <button id="btn-sort">Trier par note ↓ (DESC)</button>
    <ul id="list"></ul>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
